<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Liftin'</title>
<meta name="theme-color" content="#ff7a45">
<meta name="apple-mobile-web-app-title" content="Liftin'">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./assets/icons/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Roboto+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c0d;
    --surface: #17191b;
    --raised: #232629;
    --line: #373b40;
    --accent: #ff7a45;
    --accent-2: #b9b3aa;
    --text: #f4f2ee;
    --muted: #96928b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      linear-gradient(rgba(255, 255, 255, .025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px),
      radial-gradient(circle at 18% 0%, rgba(255, 122, 69, .14), transparent 30%),
      radial-gradient(circle at 90% 22%, rgba(120, 115, 108, .16), transparent 34%),
      var(--bg);
    background-size: 28px 28px, 28px 28px, auto, auto;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    margin: 0 auto;
    max-width: 520px;
    min-height: 100vh;
    padding: 0 0 56px;
  }
  .hero {
    padding: 48px 22px 24px;
  }
  .eyebrow {
    color: var(--accent-2);
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  h1 {
    font-size: 46px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: .95;
    text-transform: uppercase;
  }
  h1 span { color: var(--accent); }
  .section-label {
    align-items: center;
    color: var(--muted);
    display: flex;
    font-family: 'Roboto Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    gap: 10px;
    letter-spacing: 3px;
    margin: 22px 22px 9px;
    text-transform: uppercase;
  }
  .section-label::after {
    background: var(--line);
    content: '';
    flex: 1;
    height: 1px;
  }
  .workout-list {
    display: grid;
    gap: 10px;
    margin: 0 18px;
  }
  .workout-card {
    align-items: center;
    background:
      linear-gradient(135deg, rgba(255, 122, 69, .13), rgba(130, 124, 114, .08)),
      var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 18px 40px rgba(0, 0, 0, .24);
    color: var(--text);
    display: flex;
    gap: 14px;
    min-height: 86px;
    padding: 15px 16px;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .workout-card:active { filter: brightness(1.12); }
  .workout-copy { flex: 1; min-width: 0; }
  .workout-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -.4px;
    line-height: 1.1;
    text-transform: uppercase;
  }
  @media (min-width: 760px) {
    body {
      max-width: 920px;
      padding: 24px 28px 72px;
    }
    .hero {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 30px 32px;
    }
    h1 { font-size: 68px; }
    .workout-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin: 0;
    }
    .section-label { margin-left: 0; margin-right: 0; }
  }
</style>
</head>
<body>
<header class="hero">
  <div class="eyebrow">Training</div>
  <h1>Lift<span>in&#39;</span></h1>
</header>

<div class="section-label">Workouts</div>
<main class="workout-list">
  <a class="workout-card" href="./workouts/chest-tri.html">
    <div class="workout-copy">
      <div class="workout-title">Chest &amp; Tri</div>
    </div>
  </a>
  <a class="workout-card" href="./workouts/upper-body-today.html">
    <div class="workout-copy">
      <div class="workout-title">Upper Body</div>
    </div>
  </a>
</main>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
