<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chest &amp; Tri</title>
<meta name="theme-color" content="#ff7a45">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Roboto+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./workout-app.css">
</head>
<body>
<div class="back-bar"><a href="./index.html" aria-label="Back to Lift">&#8249;</a></div>
<div class="workout-clock" aria-live="polite">
  <span>Workout</span>
  <strong id="workoutElapsed">00:00</strong>
</div>

<header class="hero">
  <h1>Chest <span>&amp; Tri</span></h1>
  <div class="meta">
    <span>50-60 min</span>
    <span>RPE 7</span>
  </div>
</header>

<section class="current" aria-live="polite">
  <div class="current-main">
    <div>
      <div class="current-label" id="currentLabel">Current</div>
      <div class="current-title" id="currentTitle">Ready</div>
    </div>
    <div class="current-dose" id="currentDose">Tap a set to begin</div>
  </div>
  <div class="timer">
    <div>
      <div class="current-label">Rest Timer</div>
      <div class="timer-time" id="timerTime">01:30</div>
    </div>
  </div>
</section>

<div class="section-label">Workout</div>
<main class="exercise-list" id="exerciseList"></main>

<div class="complete-panel">
  <div class="complete-actions">
    <button type="button" class="primary" id="completeWorkout">Complete Workout</button>
    <button type="button" class="ghost" id="exportWorkoutData">Export Data</button>
  </div>
  <div class="complete-editor is-hidden" id="completeEditor">
    <label>Workout Time</label>
    <div class="complete-edit-row">
      <label class="complete-time-field" for="durationHours">Hours
        <input id="durationHours" type="number" inputmode="numeric" min="0" step="1">
      </label>
      <label class="complete-time-field" for="durationMinutes">Minutes
        <input id="durationMinutes" type="number" inputmode="numeric" min="0" max="59" step="1">
      </label>
      <button type="button" class="primary" id="saveCompleteWorkout">Save</button>
      <button type="button" class="ghost" id="cancelCompleteEdit">Cancel</button>
    </div>
  </div>
  <div class="save-note" id="saveNote"></div>
</div>

<section class="focus-screen" id="focusScreen" aria-hidden="true">
  <div class="focus-top">
    <button type="button" class="focus-back" id="exitFocus" aria-label="Back to workout plan">&#8249;</button>
    <div class="focus-status">
      <div class="focus-progress" id="focusProgress">0 / 0 sets</div>
      <div class="focus-elapsed" id="focusElapsed">00:00</div>
    </div>
  </div>
  <div class="focus-card">
    <div class="focus-main">
      <div class="focus-group" id="focusGroup">Current</div>
      <div class="focus-title" id="focusTitle">Ready</div>
      <div class="focus-set" id="focusSet">Set 1</div>
      <div class="focus-options">
        <button type="button" class="backup-toggle is-hidden" id="focusBackup"></button>
        <button type="button" class="skip-toggle is-hidden" id="focusSkip">Skip Exercise</button>
        <button type="button" class="add-set-toggle is-hidden" id="focusAddSet">Add Set</button>
        <button type="button" class="switch-ender-toggle is-hidden" id="focusSwitchEnder"></button>
      </div>
    </div>
    <div class="focus-rest">
      <div class="focus-timer-panel">
        <div class="current-label">Rest Timer</div>
        <div class="focus-time" id="focusTimerTime">00:45</div>
      </div>
      <div class="focus-inputs" id="focusInputs">
        <div class="focus-field">
          <label for="actualReps">Reps</label>
          <input id="actualReps" type="number" inputmode="numeric" min="0" placeholder="Reps">
        </div>
        <div class="focus-field weight-field" id="weightField">
          <label for="actualWeight">Weight</label>
          <input id="actualWeight" type="number" inputmode="decimal" min="0" step="0.5" placeholder="Lbs">
        </div>
      </div>
      <div class="focus-buttons">
        <button type="button" class="ghost focus-next is-hidden" id="focusNext">Next</button>
        <button type="button" class="primary focus-log" id="focusLogSet">Log Set</button>
      </div>
    </div>
  </div>
</section>

<script>
  window.liftWorkoutConfig = {
  "title": "Chest & Tri",
  "stateKey": "standalone-lift-chest-tri-state",
  "historyKey": "standalone-lift-chest-tri-history",
  "source": "Lift Log - Chest & Tri",
  "exportPrefix": "lift-chest-tri",
  "workout": [
    {
      "group": "Warm Up",
      "name": "Band pull-aparts",
      "sets": 2,
      "reps": "15",
      "rest": 45,
      "track": "none"
    },
    {
      "group": "Warm Up",
      "name": "Push-ups",
      "sets": 2,
      "reps": "8",
      "rest": 45,
      "track": "none"
    },
    {
      "group": "Chest",
      "name": "Barbell bench press",
      "sets": 4,
      "reps": "5",
      "rest": 120,
      "track": "weight"
    },
    {
      "group": "Chest",
      "name": "Incline dumbbell press",
      "sets": 3,
      "reps": "8",
      "rest": 90,
      "track": "weight"
    },
    {
      "group": "Chest",
      "name": "Cable fly",
      "sets": 3,
      "reps": "12",
      "rest": 60,
      "track": "weight"
    },
    {
      "group": "Chest",
      "name": "Machine chest press",
      "sets": 2,
      "reps": "10",
      "rest": 75,
      "track": "weight"
    },
    {
      "group": "Triceps",
      "name": "Rope pressdown",
      "sets": 3,
      "reps": "12",
      "rest": 60,
      "track": "weight"
    },
    {
      "group": "Triceps",
      "name": "Overhead cable extension",
      "sets": 2,
      "reps": "15",
      "rest": 60,
      "track": "weight"
    },
    {
      "group": "Finisher",
      "name": "Dynamic Ender",
      "sets": 1,
      "reps": "10 min",
      "rest": 0,
      "track": "none",
      "dynamicFinisher": true
    }
  ]
};
</script>
<script src="./workout-app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
